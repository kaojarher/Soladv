
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
#gr{font-family:'Courier New',monospace;background:#111;color:#eee;padding:8px;width:100%;}
#hud{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:6px;}
.hs{background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:5px 8px;font-size:11px;display:flex;align-items:center;gap:5px;}
.hp-bar{flex:1;height:8px;background:#2a2a2a;border-radius:3px;overflow:hidden;}
.hp-fill{height:100%;background:#e24b4a;transition:width .3s;}
#board-wrap{position:relative;width:100%;}
#board{display:grid;gap:1px;background:#222;border:2px solid #444;border-radius:6px;padding:4px;margin:0 auto;}
.cell{display:flex;align-items:center;justify-content:center;border-radius:3px;cursor:default;position:relative;transition:background .12s;overflow:hidden;}
.cell.floor{background:#181818;}
.cell.wall{background:#252525;border:1px solid #333;}
.cell.door{background:#181818;}
.cell.hl{background:#1e2d1e;cursor:pointer;}
.cell.hl:active{background:#2d3d2d;}
.cell.pl{background:#18182a;}
.cell-inner{display:flex;align-items:center;justify-content:center;width:100%;height:100%;}
#log{margin-top:6px;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:6px;padding:6px 8px;font-size:11px;color:#999;height:44px;overflow-y:auto;}
#log p{margin-bottom:1px;}
#minimap-wrap{margin-top:8px;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:6px;padding:8px;display:flex;flex-direction:column;align-items:center;gap:4px;}
#minimap-label{font-size:10px;color:#555;align-self:flex-start;width:100%;display:flex;justify-content:space-between;}
#minimap-canvas{display:block;}
#joystick-area{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding:0 8px;}
#js-wrap{position:relative;width:120px;height:120px;flex-shrink:0;}
#js-base{width:120px;height:120px;border-radius:50%;background:#1a1a1a;border:2px solid #3a3a3a;position:absolute;top:0;left:0;}
#js-stick{width:48px;height:48px;border-radius:50%;background:#2e2e2e;border:2px solid #555;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);cursor:grab;touch-action:none;}
#side-btns{display:flex;flex-direction:column;gap:8px;}
#side-btns button{background:#1a1a1a;color:#bbb;border:1px solid #383838;border-radius:8px;padding:10px 14px;font-size:12px;cursor:pointer;touch-action:manipulation;white-space:nowrap;}
#side-btns button:active{background:#2a2a2a;transform:scale(0.95);}
.float-dmg{position:absolute;top:-4px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:700;animation:fup .65s forwards;pointer-events:none;z-index:9;white-space:nowrap;}
.rd{color:#f55;}.gn{color:#5f5;}.yl{color:#fd4;}
@keyframes fup{0%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-22px)}}
#ov{background:rgba(0,0,0,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px;border-radius:6px;min-height:200px;}
#ov h2{font-size:22px;color:#ffd700;}
#ov p{font-size:12px;color:#aaa;text-align:center;}
#ov button{margin-top:6px;padding:10px 22px;background:#2a2a2a;color:#eee;border:1px solid #555;border-radius:8px;font-size:13px;cursor:pointer;}
</style>

<h2 class="sr-only">衛兵地牢闖關 — 拯救人質、收集金幣</h2>
<div id="gr">
  <div id="hud">
    <div class="hs"><span style="font-size:15px;">💂🏼</span><div class="hp-bar"><div class="hp-fill" id="hpb"></div></div><span id="hpt" style="font-size:11px;"></span></div>
    <div class="hs" style="gap:6px;">⚔️<span id="atkt">4</span>&nbsp;💰<span id="goldt">0</span>&nbsp;🏆<span id="scoret">0</span></div>
  </div>
  <div id="board-wrap"><div id="board"></div></div>
  <div id="log"></div>
  <div id="minimap-wrap">
    <div id="minimap-label"><span>探索地圖｜房間 <span id="flrt">1</span></span><span>救援 <span id="rescuet">0</span> 人</span></div>
    <canvas id="minimap-canvas" width="220" height="110"></canvas>
  </div>
  <div id="joystick-area">
    <div id="js-wrap">
      <div id="js-base"></div>
      <div id="js-stick"></div>
    </div>
    <div id="side-btns">
      <button onclick="restart()">🔄 重新開始</button>
      <button onclick="skipFloor()">⏭ 下一層</button>
    </div>
  </div>
</div>

<script>
const COLS=7,ROWS=7;
const CIVILIANS=['👩','👧','🧒','👩‍🦳','👧🏽','🧒🏻'];
const EM={ghost:'👻',skeleton:'💀',chest:'📦',purse:'💰',boss:'👹',potion:'🧪'};
let S=null,cellPx=44;
let mapData={};
let currentRoomKey='0,0';

function roomKey(x,y){return x+','+y;}
function calcSize(){
  const wrap=document.getElementById('board-wrap');
  const avail=Math.min(wrap.offsetWidth||320,380)-16;
  cellPx=Math.floor((avail-10)/COLS);
  const board=document.getElementById('board');
  board.style.gridTemplateColumns=`repeat(${COLS},${cellPx}px)`;
  board.style.gridTemplateRows=`repeat(${ROWS},${cellPx}px)`;
}

const DIRS={N:{r:0,c:3},S:{r:6,c:3},W:{r:3,c:0},E:{r:3,c:6}};
const DIR_ENTER={N:'S',S:'N',W:'E',E:'W'};
const DRVEC={N:[-1,0],S:[1,0],W:[0,-1],E:[0,1]};

function mkLevel(lvl,openDirs,enterDir){
  const grid=[];
  for(let r=0;r<ROWS;r++){
    grid[r]=[];
    for(let c=0;c<COLS;c++){
      const edge=r===0||r===ROWS-1||c===0||c===COLS-1;
      grid[r][c]={type:edge?'wall':'floor',entity:null,hp:0};
    }
  }
  openDirs.forEach(dir=>{
    const{r,c}=DIRS[dir];
    grid[r][c]={type:'door',entity:null,locked:false,hp:0,dir};
  });
  let pp;
  if(enterDir){
    const ed=DIRS[enterDir];
    pp={r:ed.r,c:ed.c};
    const vecs={N:[1,0],S:[-1,0],W:[0,1],E:[0,-1]};
    const[dr,dc]=vecs[enterDir]||[0,0];
    const nr=pp.r+dr,nc=pp.c+dc;
    if(nr>0&&nr<ROWS-1&&nc>0&&nc<COLS-1)pp={r:nr,c:nc};
  } else {
    pp={r:ROWS-2,c:Math.floor(COLS/2)};
  }
  grid[pp.r][pp.c].entity='player';
  const ne=2+Math.floor(lvl*0.7);
  for(let i=0;i<ne;i++){
    const k=lvl>=4?(Math.random()<.25?'boss':Math.random()<.5?'skeleton':'ghost'):(Math.random()<.5?'ghost':'skeleton');
    place(grid,k,pp,2);
  }
  if(Math.random()<0.75)place(grid,'chest',pp,1);
  if(Math.random()<0.65)place(grid,'potion',pp,0);
  if(Math.random()<0.8)place(grid,'purse',pp,1);
  const numCivil=Math.random()<0.7?1:Math.random()<0.5?2:0;
  for(let i=0;i<numCivil;i++){
    const civ=CIVILIANS[Math.floor(Math.random()*CIVILIANS.length)];
    place(grid,'civ:'+civ,pp,1);
  }
  return{grid,pp,openDirs};
}

function place(grid,kind,avoid,minD){
  for(let a=0;a<300;a++){
    const r=1+Math.floor(Math.random()*(ROWS-2));
    const c=1+Math.floor(Math.random()*(COLS-2));
    const cell=grid[r][c];
    if(cell.type==='floor'&&!cell.entity&&Math.abs(r-avoid.r)+Math.abs(c-avoid.c)>=minD){
      cell.entity=kind;return;
    }
  }
}

function randomDirs(fromDir){
  const all=['N','S','W','E'];
  const others=all.filter(d=>d!==fromDir);
  const n=1+Math.floor(Math.random()*3);
  const chosen=others.sort(()=>Math.random()-0.5).slice(0,n);
  if(!chosen.includes(fromDir))chosen.push(fromDir);
  return[...new Set(chosen)];
}

function initRoom(rx,ry,enterDir,gs){
  const key=roomKey(rx,ry);
  let roomState;
  if(mapData[key]&&mapData[key].visited){
    roomState=mapData[key];
  } else {
    const isFirst=!enterDir;
    let openDirs=isFirst?['N','S','W','E']:randomDirs(enterDir);
    if(!openDirs.includes(enterDir)&&enterDir)openDirs.push(enterDir);
    const lvl=gs?gs.totalRooms+1:1;
    roomState={...mkLevel(lvl,openDirs,enterDir),rx,ry,visited:true,openDirs};
    mapData[key]=roomState;
  }
  currentRoomKey=key;
  S={
    grid:roomState.grid,
    pp:{...roomState.pp},
    hp:gs?gs.hp:20,
    mhp:gs?gs.mhp:20,
    atk:gs?gs.atk:4,
    gold:gs?gs.gold:0,
    score:gs?gs.score:0,
    rescued:gs?gs.rescued:0,
    totalRooms:gs?gs.totalRooms+1:1,
    rx,ry,openDirs:roomState.openDirs
  };
  render();drawMinimap();
  addLog(`🚪 進入房間(${rx},${ry}) — 第${S.totalRooms}間`,true);
}

function gsSnap(){return{hp:S.hp,mhp:S.mhp,atk:S.atk,gold:S.gold,score:S.score,rescued:S.rescued,totalRooms:S.totalRooms};}

function render(){
  const board=document.getElementById('board');
  board.innerHTML='';
  const{grid,pp}=S;
  const moves=validMoves();
  const efs=Math.max(14,Math.floor(cellPx*.44));
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const cell=grid[r][c];
      const isP=pp.r===r&&pp.c===c;
      const canM=moves.some(m=>m.r===r&&m.c===c);
      const d=document.createElement('div');
      d.className='cell '+(isP?'pl':cell.type)+(canM?' hl':'');
      d.style.width=cellPx+'px';d.style.height=cellPx+'px';
      const inner=document.createElement('div');
      inner.className='cell-inner';inner.style.fontSize=efs+'px';
      if(isP)inner.textContent='💂🏼';
      else if(cell.type==='wall')inner.textContent='🧱';
      else if(cell.type==='door')inner.textContent='🚪';
      else if(cell.entity){
        if(cell.entity.startsWith('civ:')){
          const civEmoji=cell.entity.slice(4);
          inner.textContent=civEmoji;
        } else {
          inner.textContent=EM[cell.entity]||'❓';
        }
      }
      d.appendChild(inner);
      if(canM){const[rr,cc]=[r,c];d.onclick=()=>doMove(rr,cc);}
      board.appendChild(d);
    }
  }
  document.getElementById('hpb').style.width=(S.hp/S.mhp*100)+'%';
  document.getElementById('hpt').textContent=S.hp+'/'+S.mhp;
  document.getElementById('goldt').textContent=S.gold;
  document.getElementById('scoret').textContent=S.score;
  document.getElementById('flrt').textContent=S.totalRooms;
  document.getElementById('rescuet').textContent=S.rescued;
  document.getElementById('atkt').textContent=S.atk;
}

function validMoves(){
  const{pp,grid}=S;
  return[[-1,0],[1,0],[0,-1],[0,1]].map(([dr,dc])=>({r:pp.r+dr,c:pp.c+dc}))
    .filter(({r,c})=>r>=0&&r<ROWS&&c>=0&&c<COLS&&grid[r][c].type!=='wall');
}

function mv(dr,dc){if(!S)return;doMove(S.pp.r+dr,S.pp.c+dc);}

function doMove(r,c){
  if(!S)return;
  const{grid,pp}=S;
  if(r<0||r>=ROWS||c<0||c>=COLS)return;
  const cell=grid[r][c];
  if(cell.type==='wall')return;
  if(cell.type==='door'){
    const dir=cell.dir;
    const[drv,dcv]=DRVEC[dir];
    const enterDir=DIR_ENTER[dir];
    const nrx=S.rx+dcv,nry=S.ry+drv;
    const gs=gsSnap();
    addLog(`➡️ 穿越${dir}門…`);
    setTimeout(()=>initRoom(nrx,nry,enterDir,gs),200);
    return;
  }
  const en=cell.entity;
  if(en==='ghost'||en==='skeleton'||en==='boss'){combat(r,c,en);return;}
  grid[pp.r][pp.c].entity=null;
  pp.r=r;pp.c=c;
  if(en==='purse'){
    const g=3+Math.floor(Math.random()*5);
    S.gold+=g;S.score+=g*2;
    cell.entity=null;
    addLog(`💰 撿到錢袋！+${g}金幣`);
    floatAt(r,c,'+'+g+'G','yl');
  } else if(en==='chest'){
    const b=2+Math.floor(Math.random()*3);
    S.atk+=b;S.score+=10;
    cell.entity=null;
    addLog(`📦 寶箱！攻擊+${b}，分數+10`);
    floatAt(r,c,'+ATK','yl');
  } else if(en==='potion'){
    const h=4+Math.floor(Math.random()*5);
    S.hp=Math.min(S.mhp,S.hp+h);
    cell.entity=null;
    addLog(`🧪 藥水！回復${h}HP`);
    floatAt(r,c,'+'+h+'HP','gn');
  } else if(en&&en.startsWith('civ:')){
    const civEmoji=en.slice(4);
    const isChild=civEmoji==='👧'||civEmoji==='🧒'||civEmoji==='👧🏽'||civEmoji==='🧒🏻';
    const pts=isChild?50:30;
    S.rescued++;S.score+=pts;
    cell.entity=null;
    const label=isChild?'孩童':'女性';
    addLog(`${civEmoji} 救援${label}！分數+${pts} 🎉`);
    floatAt(r,c,'救+'+pts,'yl');
  }
  render();
}

function combat(r,c,en){
  const AHP={ghost:4,skeleton:7,boss:18};
  const ADM={ghost:[2,4],skeleton:[3,6],boss:[6,11]};
  const cell=S.grid[r][c];
  if(!cell.hp)cell.hp=AHP[en];
  const dmg=S.atk;
  cell.hp-=dmg;
  floatAt(r,c,'-'+dmg,'rd');
  const nm=en==='boss'?'👹BOSS':en==='ghost'?'👻':'💀';
  addLog(`⚔️ 攻擊${nm} -${dmg}HP`);
  if(cell.hp<=0){
    const pts=en==='boss'?30:en==='skeleton'?10:5;
    S.score+=pts;
    cell.entity=null;cell.hp=0;
    addLog(`💥 擊敗！分數+${pts}`);
    S.grid[S.pp.r][S.pp.c].entity=null;
    S.pp.r=r;S.pp.c=c;
    render();return;
  }
  const[lo,hi]=ADM[en];
  const edm=lo+Math.floor(Math.random()*(hi-lo+1));
  S.hp-=edm;
  floatAt(S.pp.r,S.pp.c,'-'+edm,'rd');
  addLog(`💢 反擊 -${edm}HP 剩${Math.max(0,S.hp)}`);
  if(S.hp<=0){
    S.hp=0;render();
    showOv('💀 陣亡！',`最終得分：${S.score}分 ／ 救援${S.rescued}人`,true);
    return;
  }
  render();
}

function floatAt(r,c,txt,cls){
  const board=document.getElementById('board');
  const idx=r*COLS+c;
  const cell=board.children[idx];
  if(!cell)return;
  const s=document.createElement('span');
  s.className='float-dmg '+cls;s.textContent=txt;
  cell.appendChild(s);
  setTimeout(()=>s.remove(),700);
}

function addLog(msg,clear=false){
  const el=document.getElementById('log');
  if(clear)el.innerHTML='';
  const p=document.createElement('p');p.textContent=msg;el.appendChild(p);
  el.scrollTop=el.scrollHeight;
}

function showOv(title,sub,dead=false){
  const bw=document.getElementById('board-wrap');
  let ov=bw.querySelector('#ov');
  if(!ov){ov=document.createElement('div');ov.id='ov';bw.appendChild(ov);}
  ov.innerHTML=`<h2>${title}</h2><p>${sub}</p>`+(dead?`<button onclick="restart()">🔄 再試一次</button>`:'');
}

function removeOv(){const o=document.getElementById('ov');if(o)o.remove();}

function drawMinimap(){
  const canvas=document.getElementById('minimap-canvas');
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const keys=Object.keys(mapData);
  if(!keys.length)return;
  const xs=keys.map(k=>parseInt(k.split(',')[0]));
  const ys=keys.map(k=>parseInt(k.split(',')[1]));
  const minX=Math.min(...xs),maxX=Math.max(...xs);
  const minY=Math.min(...ys),maxY=Math.max(...ys);
  const spanX=maxX-minX+1,spanY=maxY-minY+1;
  const cs=Math.min(Math.floor((W-12)/Math.max(spanX,1)),Math.floor((H-12)/Math.max(spanY,1)),28);
  const gapX=Math.floor((W-cs*spanX)/2);
  const gapY=Math.floor((H-cs*spanY)/2);
  keys.forEach(k=>{
    const[rx,ry]=[parseInt(k.split(',')[0]),parseInt(k.split(',')[1])];
    const px=gapX+(rx-minX)*cs,py=gapY+(ry-minY)*cs;
    const isCur=k===currentRoomKey;
    const room=mapData[k];
    const inner=Math.floor(cs*0.56);
    const ix=px+Math.floor((cs-inner)/2),iy=py+Math.floor((cs-inner)/2);
    ctx.fillStyle=isCur?'#3a5a3a':'#2a2a2a';
    ctx.strokeStyle=isCur?'#5faf5f':'#444';
    ctx.lineWidth=isCur?1.5:1;
    ctx.beginPath();ctx.roundRect(ix,iy,inner,inner,2);ctx.fill();ctx.stroke();
    const cx2=px+cs/2,cy2=py+cs/2;
    if(room.openDirs)room.openDirs.forEach(dir=>{
      ctx.fillStyle='#666';
      const half=Math.floor((cs-inner)/2);
      if(dir==='N')ctx.fillRect(cx2-1.5,py,3,half+1);
      else if(dir==='S')ctx.fillRect(cx2-1.5,iy+inner-1,3,half+1);
      else if(dir==='W')ctx.fillRect(px,cy2-1.5,half+1,3);
      else if(dir==='E')ctx.fillRect(ix+inner-1,cy2-1.5,half+1,3);
    });
    if(isCur){
      ctx.fillStyle='#aaffaa';
      ctx.font=`bold ${Math.max(8,Math.floor(inner*.55))}px monospace`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('☆',ix+inner/2,iy+inner/2);
    }
  });
}

function restart(){removeOv();mapData={};currentRoomKey='0,0';initRoom(0,0,null,null);}
function skipFloor(){removeOv();const gs=S?gsSnap():null;mapData={};currentRoomKey='0,0';if(gs)gs.totalRooms=(gs.totalRooms||0)+3;initRoom(0,0,null,gs);}
window.restart=restart;window.skipFloor=skipFloor;

(function setupJoystick(){
  const wrap=document.getElementById('js-wrap');
  const base=document.getElementById('js-base');
  const stick=document.getElementById('js-stick');
  const DEAD=12,R_BASE=60,R_STICK=24;
  let dragging=false,lastDir=null,moveTimer=null;
  function getDir(dx,dy){if(Math.sqrt(dx*dx+dy*dy)<DEAD)return null;return Math.abs(dx)>Math.abs(dy)?(dx>0?[0,1]:[0,-1]):(dy>0?[1,0]:[-1,0]);}
  function setStick(dx,dy){const dist=Math.min(Math.sqrt(dx*dx+dy*dy),R_BASE-R_STICK);const a=Math.atan2(dy,dx);stick.style.transform=`translate(calc(-50% + ${dist*Math.cos(a)}px),calc(-50% + ${dist*Math.sin(a)}px))`;}
  function resetStick(){stick.style.transform='translate(-50%,-50%)';}
  function process(dx,dy){setStick(dx,dy);const dir=getDir(dx,dy);if(!dir){lastDir=null;clearInterval(moveTimer);moveTimer=null;return;}if(lastDir&&lastDir[0]===dir[0]&&lastDir[1]===dir[1])return;lastDir=dir;clearInterval(moveTimer);mv(dir[0],dir[1]);moveTimer=setInterval(()=>mv(dir[0],dir[1]),220);}
  function coords(e){const pt=e.touches?e.touches[0]:e;const br=base.getBoundingClientRect();return[pt.clientX-br.left-br.width/2,pt.clientY-br.top-br.height/2];}
  wrap.addEventListener('mousedown',e=>{dragging=true;process(...coords(e));});
  window.addEventListener('mousemove',e=>{if(!dragging)return;process(...coords(e));});
  window.addEventListener('mouseup',()=>{dragging=false;resetStick();lastDir=null;clearInterval(moveTimer);moveTimer=null;});
  wrap.addEventListener('touchstart',e=>{e.preventDefault();dragging=true;process(...coords(e));},{passive:false});
  window.addEventListener('touchmove',e=>{if(!dragging)return;e.preventDefault();process(...coords(e));},{passive:false});
  window.addEventListener('touchend',()=>{dragging=false;resetStick();lastDir=null;clearInterval(moveTimer);moveTimer=null;});
})();

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowUp')mv(-1,0);else if(e.key==='ArrowDown')mv(1,0);
  else if(e.key==='ArrowLeft')mv(0,-1);else if(e.key==='ArrowRight')mv(0,1);
});
window.addEventListener('resize',()=>{calcSize();if(S)render();});
setTimeout(()=>{calcSize();initRoom(0,0,null,null);},80);
</script>
